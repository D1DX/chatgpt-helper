<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F5F7FA;
      color: #4A4A4A;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #005490;
      margin-bottom: 14px;
    }
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      color: #fff;
      background: #FF6900;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 14px;
      border-bottom: 2px solid #e0e0e0;
    }
    .tab {
      flex: 1;
      padding: 8px 0;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      color: #999;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab:hover { color: #666; }
    .tab.active { color: #005490; border-bottom-color: #005490; }

    /* Fields */
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      margin-bottom: 3px;
      color: #666;
    }
    .field { margin-bottom: 10px; }
    select, input[type="date"], input[type="text"], input[type="number"] {
      width: 100%;
      padding: 6px 8px;
      font-size: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      font-family: inherit;
    }
    .row { display: flex; gap: 8px; }
    .row .field { flex: 1; }
    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }
    .checkbox-field input[type="checkbox"] { width: auto; margin: 0; }
    .checkbox-field label { margin: 0; font-size: 12px; }
    .hint {
      font-size: 10px;
      color: #999;
      margin-top: 2px;
    }

    /* Buttons */
    .actions { margin-top: 4px; }
    button {
      width: 100%;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #005490; }
    .btn-primary:hover:not(:disabled) { background: #003d6b; }
    .btn-warning { background: #e67e22; }
    .btn-warning:hover:not(:disabled) { background: #d35400; }
    .btn-success { background: #0FB5A9; }
    .btn-success:hover:not(:disabled) { background: #0a8f86; }

    /* Progress */
    #progress {
      margin-top: 10px;
      font-size: 11px;
      color: #666;
      min-height: 14px;
    }
    #progress-bar-container {
      display: none;
      margin-top: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
      height: 6px;
    }
    #progress-bar {
      height: 100%;
      background: #0FB5A9;
      width: 0%;
      transition: width 0.3s;
    }
    .error { color: #c0392b; }

    /* Log */
    #log-container {
      display: none;
      margin-top: 10px;
      height: 120px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 6px 8px;
    }
    #log {
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 10px;
      color: #666;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Footer */
    .disclaimer {
      margin-top: 10px;
      padding: 6px 8px;
      font-size: 10px;
      color: #888;
      background: #eee;
      border-radius: 3px;
      line-height: 1.4;
    }
    .footer {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #e0e0e0;
      font-size: 10px;
      color: #999;
      text-align: center;
    }
    .footer a { color: #005490; text-decoration: none; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <h1>ChatGPT Helper <span class="badge">D1DX</span></h1>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="export">Export</div>
    <div class="tab" data-tab="archive">Archive</div>
    <div class="tab" data-tab="unarchive">Unarchive</div>
  </div>

  <!-- Shared filters -->
  <div class="field">
    <label>Project</label>
    <select id="project">
      <option value="all">All conversations</option>
      <option value="inbox">Inbox (no project)</option>
    </select>
    <div id="project-loading" class="hint">Loading projects…</div>
  </div>

  <div class="field" id="source-field">
    <label>Source</label>
    <select id="source">
      <option value="active">Active</option>
      <option value="archived">Archived</option>
      <option value="both" selected>Both</option>
    </select>
  </div>

  <div class="row">
    <div class="field">
      <label>From</label>
      <input type="date" id="date-from">
    </div>
    <div class="field">
      <label>To</label>
      <input type="date" id="date-to">
    </div>
  </div>

  <div class="field">
    <label>Keyword</label>
    <input type="text" id="keyword" placeholder="Filter by title">
  </div>

  <div class="checkbox-field">
    <input type="checkbox" id="export-all" checked>
    <label for="export-all">All matching conversations</label>
  </div>

  <div class="field hidden" id="limit-field">
    <label>Max conversations</label>
    <input type="number" id="limit" value="10" min="1">
  </div>

  <!-- Export-only options -->
  <div id="export-options">
    <div class="field">
      <label>Format</label>
      <select id="format">
        <option value="json">JSON — full backup</option>
        <option value="markdown">Markdown — AI-ready</option>
        <option value="jsonl">JSONL — fine-tuning</option>
        <option value="html">HTML — browser viewable</option>
        <option value="csv">CSV — spreadsheet</option>
        <option value="txt">Plain text</option>
      </select>
    </div>

    <div class="checkbox-field" id="attachments-field">
      <input type="checkbox" id="attachments">
      <label for="attachments">Include attachments &amp; images</label>
    </div>
  </div>

  <!-- Action buttons -->
  <div class="actions">
    <button id="export-btn" class="btn-primary">Export</button>
    <button id="archive-btn" class="btn-warning hidden">Archive matching</button>
    <button id="unarchive-btn" class="btn-success hidden">Unarchive matching</button>
  </div>

  <div id="progress"></div>
  <div id="progress-bar-container"><div id="progress-bar"></div></div>

  <div id="log-container">
    <div id="log"></div>
  </div>

  <div class="disclaimer">
    Not affiliated with OpenAI. Uses an unofficial API that may change without notice.
  </div>

  <div class="footer">
    Open source by <a href="https://github.com/d1dx" target="_blank">D1DX</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
